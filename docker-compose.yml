version: "3.8"

services:
  bot:
    build: .
    container_name: polytrader-bot
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: python main.py

  dashboard:
    build: .
    container_name: polytrader-dashboard
    env_file: .env
    ports:
      - "${DASHBOARD_PORT:-8502}:8502"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: streamlit run src/dashboard/app.py --server.port 8502 --server.address 0.0.0.0
